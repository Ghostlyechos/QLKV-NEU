{% extends "base.html" %}
{% block title %}Thêm Đơn vị Mới{% endblock %}
{% block content %}
<style>
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input[type="text"], input[type="email"], select, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;}
    .btn-save { padding: 10px 20px; background-color: #0056b3; color: white; border: none; cursor: pointer; font-size: 16px; font-weight: bold; border-radius: 4px; }
    .btn-save:hover { background-color: #003366; }
    .form-container { max-width: 600px; border: 1px solid #ddd; padding: 20px; background: #f9f9f9; border-radius: 5px; margin-top: 20px; }
</style>

<div style="padding: 20px;">
    <h2 style="color: #003366; margin-top: 0;">THÊM ĐƠN VỊ MỚI</h2>

    <div class="form-container">
        <form action="/admin/add" method="POST">
            <div class="form-group">
                <label>Tên Đơn vị (*):</label>
                <input type="text" name="TenDonVi" required placeholder="VD: Khoa Kinh tế Quốc tế...">
            </div>

            <div class="form-group">
                <label>Đây là đơn vị Cấp mấy?</label>
                <select name="IsParent" id="isParentSelect" onchange="toggleParentBox()">
                    <option value="1">Đơn vị Cấp 1 (Trường, Viện, Trung tâm lớn)</option>
                    <option value="0">Đơn vị Cấp 2 (Khoa, Phòng ban)</option>
                </select>
            </div>

            <div class="form-group" id="parentSelectionBox" style="display: none;">
                <label>Trực thuộc Trường/Viện nào? (*):</label>
                <select name="ParentID">
                    {% for p in parents %}
                        <option value="{{ p.IDDonVi }}">{{ p.TenDonVi }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group" style="background: #e9ecef; padding: 15px; border-radius: 4px;">
                <label>Tùy chọn Website (*):</label>
                <div style="margin-bottom: 8px;">
                    <input type="radio" name="LoaiWebsite" value="external" id="optExt" checked onchange="toggleWebBox()">
                    <label for="optExt" style="display:inline; font-weight:normal; cursor:pointer;">Dùng link website ngoài</label>
                </div>
                <div>
                    <input type="radio" name="LoaiWebsite" value="internal" id="optInt" onchange="toggleWebBox()">
                    <label for="optInt" style="display:inline; font-weight:normal; cursor:pointer;">Tạo trang web nội bộ</label>
                </div>
            </div>

            <div class="form-group" id="webInputBox">
                <label>Link Website có sẵn:</label>
                <input type="text" name="WebsiteLink" placeholder="https://...">
            </div>

            <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;">

            <div class="form-group">
                <label>Địa điểm / Văn phòng:</label>
                <input type="text" name="DiaDiem" placeholder="VD: Tòa nhà A1, ngõ 207 Giải Phóng...">
            </div>

            <div class="form-group" style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>Email liên hệ:</label>
                    <input type="email" name="Email" placeholder="VD: mail@neu.edu.vn">
                </div>
                <div style="flex: 1;">
                    <label>Điện thoại:</label>
                    <input type="text" name="DienThoai" placeholder="VD: 024.36280280">
                </div>
            </div>

            <div class="form-group">
                <label>Bài viết Mô tả / Giới thiệu:</label>
                <textarea name="MoTa" rows="6" placeholder="Nhập nội dung giới thiệu chi tiết về đơn vị..."></textarea>
            </div>

            <button type="submit" class="btn-save">💾 Lưu dữ liệu</button>
            <a href="/admin" style="margin-left: 15px; text-decoration: none; color: #dc3545; font-weight: bold;">❌ Hủy bỏ</a>
        </form>
    </div>
</div>

<script>
    function toggleParentBox() {
        var isParent = document.getElementById("isParentSelect").value;
        var parentBox = document.getElementById("parentSelectionBox");
        parentBox.style.display = (isParent === "0") ? "block" : "none";
    }
    function toggleWebBox() {
        var isInternal = document.getElementById("optInt").checked;
        var webBox = document.getElementById("webInputBox");
        webBox.style.display = isInternal ? "none" : "block";
    }
</script>
{% endblock %}
