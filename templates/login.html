{% extends "base.html" %}

{% block title %}Đăng nhập Quản trị{% endblock %}

{% block content %}
<style>
    .login-container { display: flex; justify-content: center; padding-top: 80px; }
    .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; border: 1px solid #ddd; }
    .login-box h2 { color: #003366; margin-top: 0; }
    .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .login-box button { width: 100%; padding: 12px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
    .login-box button:hover { background: #003366; }
    .error { color: #dc3545; margin-bottom: 10px; font-weight: bold; font-size: 14px; }
</style>

<div class="login-container">
    <div class="login-box">
        <h2>ĐĂNG NHẬP ADMIN</h2>
        
        {% if error %}
            <div class="error">⚠️ {{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Tài khoản..." required autocomplete="off">
            <input type="password" name="password" placeholder="Mật khẩu..." required>
            <button type="submit">Đăng nhập</button>
        </form>
    </div>
</div>
{% endblock %}
